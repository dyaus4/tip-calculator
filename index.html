<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="icon.png" type="image/png">
</head>
<body>
    <div class="container">
        <h1>Tip Calculator</h1>
        <p class="desc">Enter Bill Amount and Tip Percentage to get Total Payable Amount.</p>
        <div class="form">
            <label for="bill">Bill Amount: </label><br>
            <input type="number" name="bill" id="bill" placeholder="Enter Bill Amount"><br>
            <label for="tip">Tip Percentage: </label><br>
            <input type="number" name="tip" id="tip" placeholder="Enter Tip Percentage"><br>
            <button id="btn">CALCULATE</button>
            <p id="total">Total: </p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
